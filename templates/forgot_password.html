<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
</head>
<body>

{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, message in messages %}
    <p style="color:green;">{{ message }}</p>
  {% endfor %}
{% endwith %}

<h2>Reset Your Password</h2>

<form action="/reset-password-direct" method="POST">
    <input type="email" name="email" required placeholder="Enter your registered email"><br><br>

    <input type="password" name="new_password" required placeholder="Enter new password"><br><br>

    <button type="submit">Reset Password</button>
</form>

<br>

<a href="/login">Back to Login</a>

</body>
</html>
